        <g transform="translate(114,114) scale(11.8)">
          <path d="M4.709 15.955l4.72-2.647.08-.23-.08-.128H9.2l-.79-.048-2.698-.073-2.339-.097-2.266-.122-.571-.121L0 11.784l.055-.352.48-.321.686.06 1.52.103 2.278.158 1.652.097 2.449.255h.389l.055-.157-.134-.098-.103-.097-2.358-1.596-2.552-1.688-1.336-.972-.724-.491-.364-.462-.158-1.008.656-.722.881.06.225.061.893.686 1.908 1.476 2.491 1.833.365.304.145-.103.019-.073-.164-.274-1.355-2.446-1.446-2.49-.644-1.032-.17-.619a2.97 2.97 0 01-.104-.729L6.283.134 6.696 0l.996.134.42.364.62 1.414 1.002 2.229 1.555 3.03.456.898.243.832.091.255h.158V9.01l.128-1.706.237-2.095.23-2.695.08-.76.376-.91.747-.492.584.28.48.685-.067.444-.286 1.851-.559 2.903-.364 1.942h.212l.243-.242.985-1.306 1.652-2.064.73-.82.85-.904.547-.431h1.033l.76 1.129-.34 1.166-1.064 1.347-.881 1.142-1.264 1.7-.79 1.36.073.11.188-.02 2.856-.606 1.543-.28 1.841-.315.833.388.091.395-.328.807-1.969.486-2.309.462-3.439.813-.042.03.049.061 1.549.146.662.036h1.622l3.02.225.79.522.474.638-.079.485-1.215.62-1.64-.389-3.829-.91-1.312-.329h-.182v.11l1.093 1.068 2.006 1.81 2.509 2.33.127.578-.322.455-.34-.049-2.205-1.657-.851-.747-1.926-1.62h-.128v.17l.444.649 2.345 3.521.122 1.08-.17.353-.608.213-.668-.122-1.374-1.925-1.415-2.167-1.143-1.943-.14.08-.674 7.254-.316.37-.729.28-.607-.461-.322-.747.322-1.476.389-1.924.315-1.53.286-1.9.17-.632-.012-.042-.14.018-1.434 1.967-2.18 2.945-1.726 1.845-.414.164-.717-.37.067-.662.401-.589 2.388-3.036 1.44-1.882.93-1.086-.006-.158h-.055L4.132 18.56l-1.13.146-.487-.456.061-.746.231-.243 1.908-1.312-.006.006z" fill="#D97757" fill-rule="nonzero"/>

    </div>

    <!-- Title -->
    <h1 class="title">AI 工具箱</h1>
    <p class="subtitle">Claude / OpenAI / Codex 多供应商管理 · 一键切换 · 桌面客户端</p>

    <!-- Version badge -->
    <div class="version-row">
      <span class="badge" id="version-badge">加载中…</span>
      <span class="meta" id="file-meta"></span>
    </div>

    <!-- Download buttons -->
    <div class="btn-group">
      <a class="btn btn-primary" id="btn-mirror" href="#" target="_blank" rel="noopener">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
        高速下载
      </a>
      <a class="btn btn-secondary" id="btn-github" href="#" target="_blank" rel="noopener">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/></svg>
        GitHub 直链
      </a>
    </div>

    <!-- Fallback: direct server link -->
    <p class="fallback-link">
      备用下载：<a id="btn-server" href="https://ruyiagents.com/releases/" target="_blank" rel="noopener">ruyiagents.com/releases</a>
    </p>

    <!-- Changelog -->
    <details class="changelog" id="changelog-section">
      <summary>更新日志</summary>
      <pre id="changelog-body">加载中…</pre>
    </details>

    <!-- Footer -->
    <footer class="footer">
      <span>Windows 10/11 · 64-bit</span>
      <span class="sep">·</span>
      <a href="https://github.com/luoxk/ai-toolbox-releases" target="_blank" rel="noopener">GitHub</a>
      <span class="sep">·</span>
      <span>&copy; 2026 AI 工具箱</span>
    </footer>
  </main>

  <!-- Error fallback -->
  <div class="error-banner" id="error-banner" hidden>
    无法获取最新版本信息，请直接访问
    <a href="https://github.com/luoxk/ai-toolbox-releases/releases" target="_blank">GitHub Releases</a>
    或
    <a href="https://ruyiagents.com/releases/" target="_blank">备用下载</a>
  </div>

  <script>
    const REPO = 'luoxk/ai-toolbox-releases';
    const MIRROR = 'https://ghfast.com/';
    const API = `https://api.github.com/repos/${REPO}/releases/latest`;

    async function init() {
      try {
        const resp = await fetch(API);
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const data = await resp.json();

        // Version badge
        const tag = data.tag_name || '';
        document.getElementById('version-badge').textContent = tag;

        // Find first .exe or .zip asset
        const asset = data.assets.find(a =>
          a.name.endsWith('.exe') || a.name.endsWith('.zip')
        );

        if (asset) {
          const ghUrl = asset.browser_download_url;
          const mirrorUrl = MIRROR + ghUrl;

          document.getElementById('btn-mirror').href = mirrorUrl;
          document.getElementById('btn-github').href = ghUrl;

          // File meta
          const sizeMB = (asset.size / 1024 / 1024).toFixed(1);
          document.getElementById('file-meta').textContent = `${asset.name} · ${sizeMB} MB`;
        } else {
          document.getElementById('btn-mirror').href = `https://github.com/${REPO}/releases/latest`;
          document.getElementById('btn-github').href = `https://github.com/${REPO}/releases/latest`;
          document.getElementById('file-meta').textContent = '未找到安装包';
        }

        // Changelog
        const body = (data.body || '').trim();
        document.getElementById('changelog-body').textContent = body || '此版本未附带更新说明。';

      } catch (err) {
        console.error('Failed to fetch release:', err);
        document.getElementById('version-badge').textContent = '获取失败';
        document.getElementById('error-banner').hidden = false;
        // Fallback links
        document.getElementById('btn-mirror').href = `https://github.com/${REPO}/releases/latest`;
        document.getElementById('btn-github').href = `https://github.com/${REPO}/releases/latest`;
      }
    }

    init();
  </script>
</body>
</html>
