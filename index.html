  <!-- Error fallback -->

    无法获取最新版本信息，请直接访问
    <a href="https://github.com/luoxk/ai-toolbox-releases/releases" target="_blank">GitHub Releases</a>
    或
    <a href="https://ruyiagents.com/releases/" target="_blank">备用下载</a>
  </div>

  <script>
    const MIRROR = 'https://j.1lin.dpdns.org/';
    const DATA_URL = 'latest.json';

    async function init() {
      try {
        const resp = await fetch(DATA_URL);
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const data = await resp.json();

        // Version badge
        document.getElementById('version-badge').textContent = data.version || '';

        // Windows
        const win = data.assets && data.assets.windows;
        if (win && win.url) {
          document.getElementById('btn-win-mirror').href = MIRROR + win.url;
          document.getElementById('btn-win-github').href = win.url;
          const sizeMB = (win.size / 1024 / 1024).toFixed(1);
          document.getElementById('meta-windows').textContent = `${win.name} · ${sizeMB} MB`;
          document.getElementById('card-windows').classList.remove('platform-disabled');
        } else {
          document.getElementById('card-windows').classList.add('platform-disabled');
          document.getElementById('meta-windows').textContent = '暂无安装包';
          document.getElementById('btn-win-mirror').replaceWith(createDisabledBtn());
          document.getElementById('btn-win-github').remove();
        }

        // macOS (future)
        const mac = data.assets && data.assets.macos;
        if (mac && mac.url) {
          // enablePlatformCard('macos', mac);
        }

        // Linux (future)
        const linux = data.assets && data.assets.linux;
        if (linux && linux.url) {
          // enablePlatformCard('linux', linux);
        }

        // Changelog
        const body = (data.changelog || '').trim();
        document.getElementById('changelog-body').textContent = body || '此版本未附带更新说明。';

      } catch (err) {
        console.error('Failed to fetch release:', err);
        document.getElementById('version-badge').textContent = '暂无发布';
        document.getElementById('error-banner').hidden = false;
        document.getElementById('card-windows').classList.add('platform-disabled');
        document.getElementById('meta-windows').textContent = '暂无安装包';
        const mirrorBtn = document.getElementById('btn-win-mirror');
        const ghBtn = document.getElementById('btn-win-github');
        if (mirrorBtn) { const d = createDisabledBtn(); mirrorBtn.replaceWith(d); }
        if (ghBtn) { ghBtn.remove(); }
      }
    }

    function createDisabledBtn() {
      const span = document.createElement('span');
      span.className = 'btn btn-disabled btn-sm';
      span.textContent = '敬请期待';
      return span;
    }

    init();
  </script>
